backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: greenleaf_backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_USER: gardenuser
      DB_PASSWORD: gardenpass
      DB_NAME: gardening_db
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - greenleaf_net
    expose:
      - "5000"

  # ── Tier 3: Nginx + Frontend ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: greenleaf_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - greenleaf_net

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  greenleaf_net:
    driver: bridge
